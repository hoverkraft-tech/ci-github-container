---
name: "Get image metadata"
description: |
  Action to retrieve required metadata to build Docker image.
  Generate Docker image metadata including tags, labels, and annotations for container builds.
  It uses the [docker/metadata-action](https://github.com/docker/metadata-action) to generate the metadata based on the current GitHub context.
author: hoverkraft
branding:
  icon: info
  color: blue

outputs:
  image:
    description: |
      Forged image name containing registry.
      Example: `ghcr.io/my-org/my-repo/application`
    value: ${{ steps.generate-outputs.outputs.image }}
  labels:
    description: "The image labels."
    value: ${{ steps.generate-outputs.outputs.labels }}
  annotations:
    description: "The image annotations."
    value: ${{ steps.generate-outputs.outputs.annotations }}
  tags:
    description: 'The image tags. Example: `pr-63-5222075\npr-63`'
    value: ${{ steps.generate-outputs.outputs.tags }}

inputs:
  oci-registry:
    description: "OCI registry where to pull and push images"
    default: "ghcr.io"
    required: true
  repository:
    description: "Repository name. Example: `my-org/my-repo`. See [Docker get-image-name action](../get-image-name/README.md)"
    default: ${{ github.repository }}
    required: false
  image:
    description: "Additional image name. Example: `application`. See [Docker get-image-name action](../get-image-name/README.md)"
    required: false
  tag:
    description: "Force image tag to publish"
    required: false

runs:
  using: "composite"
  steps:
    # #region Prepare build variables

    - uses: hoverkraft-tech/ci-github-common/actions/local-actions@59c06291a1619e383a38f2006f15627aa528bb95 # 0.37.0
      with:
        source-path: ${{ github.action_path }}/../..

    - id: image-name
      uses: ./../self-actions/docker/get-image-name
      with:
        image: ${{ inputs.image }}
        repository: ${{ inputs.repository }}
        oci-registry: ${{ inputs.oci-registry }}

    - id: get-issue-number
      if: inputs.tag == '' && (github.event_name == 'pull_request' || github.event_name == 'pull_request_review' || github.event_name == 'issue_comment')
      uses: hoverkraft-tech/ci-github-common/actions/get-issue-number@59c06291a1619e383a38f2006f15627aa528bb95 # 0.37.0

    - id: define-metadata-inputs
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        INPUT_TAG: ${{ inputs.tag }}
        GH_REF: ${{ github.ref }}
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        ISSUE_NUMBER: ${{ steps.get-issue-number.outputs.issue-number }}
      with:
        result-encoding: string
        script: |
          const tagInput = process.env.INPUT_TAG || "";
          if (tagInput.length) {
            core.setOutput('tags',`type=raw,value=${tagInput}`);
            core.setOutput('flavor', 'latest=false');
            return;
          }

          // If push on default branch set tag to latest
          const defaultBranch = process.env.DEFAULT_BRANCH || "";
          const isPushOnDefaultBranch = context.eventName === 'push' && (process.env.GH_REF || "") === `refs/heads/${defaultBranch}`;
          // For schedule events, don't set latest tag to avoid unintended updates
          const isSchedule = context.eventName === 'schedule';
          core.setOutput('flavor', (isPushOnDefaultBranch && !isSchedule) ? 'latest=true' : 'latest=false');

          const isPullRequestOrIssueComment =
            context.eventName === 'pull_request'
            || context.eventName === 'pull_request_review'
            || context.eventName === 'issue_comment';

          if(isPullRequestOrIssueComment) {
            core.setOutput('tags',[
              `type=sha,prefix=pr-${process.env.ISSUE_NUMBER || ""}-`,
              `type=ref,event=pr`,
            ].join("\n"));
            return;
          }

          const isPushOrWorkflowDispatch = context.eventName === 'push' || context.eventName === 'workflow_dispatch';
          if(isPushOrWorkflowDispatch) {
            const isTag = context.ref.startsWith('refs/tags/');
            core.setOutput('tags', isTag ? `type=ref,event=tag` : `type=ref,event=branch`);
            return;
          }

          // For schedule events, use the default branch name as tag
          if(context.eventName === 'schedule') {
            core.setOutput('tags', `type=raw,value=${defaultBranch}`);
            return;
          }

          core.setFailed(`No tags found for the current event: ${context.eventName}`);

    - id: docker-metadata
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ${{ steps.image-name.outputs.image-name-with-registry }}
        tags: ${{ steps.define-metadata-inputs.outputs.tags }}
        flavor: ${{ steps.define-metadata-inputs.outputs.flavor }}
        context: git
      env:
        DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,manifest-descriptor

    - id: generate-outputs
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        IMAGE_NAME_WITH_REGISTRY: ${{ steps.image-name.outputs.image-name-with-registry }}
        DOCKER_METADATA_LABELS: ${{ steps.docker-metadata.outputs.labels }}
        DOCKER_METADATA_ANNOTATIONS: ${{ steps.docker-metadata.outputs.annotations }}
        DOCKER_METADATA_TAGS: ${{ steps.docker-metadata.outputs.tags }}
      with:
        script: |
          const image = process.env.IMAGE_NAME_WITH_REGISTRY || "";
          core.setOutput('image', image);

          const labels = process.env.DOCKER_METADATA_LABELS || "";
          core.setOutput('labels', labels);

          const annotations = process.env.DOCKER_METADATA_ANNOTATIONS || "";
          core.setOutput('annotations', annotations);

          const tags = process.env.DOCKER_METADATA_TAGS || "";

          const sortedTags = tags
            .split("\n")
            .sort((a, b) => {
              // Move "latest" at the end
              if (a.includes("latest")) {
                return 1
              };
              if (b.includes("latest")) {
                return -1
              };

              // Sort by length
              return b.length - a.length;
            })
            .join("\n");

          core.setOutput('tags', sortedTags);
