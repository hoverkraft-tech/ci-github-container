---
name: "Docker - Create images manifests"
description: |
  Action to create built images manifests.
  It uses the Docker Buildx plugin to create manifests for the built images.
  It requires the Docker Buildx plugin to be installed and configured.
  It supports creating manifests for multiple images and platforms at once.
author: hoverkraft
branding:
  icon: package
  color: blue

inputs:
  oci-registry:
    description: |
      OCI registry configuration used to pull, push and cache images.
      Accepts either a registry hostname string (default format) or a JSON object.
      JSON example: `{"pull":"docker.io","pull:private":"ghcr.io","push":"ghcr.io"}`
      JSON object keys:
      - `pull`: registry used to pull public or default base images
      - `pull:<name>`: additional pull registry
      - `push`: registry used for published images
      - `cache`: registry used when `cache-type` is `registry`
    default: "ghcr.io"
    required: true
  oci-registry-username:
    description: |
      Username configuration used to log against OCI registries.
      Accepts either a single username string (default format) or a JSON object using the same keys as `oci-registry`.
      JSON example: `{"pull:private":"$\{{ github.repository_owner }}","push":"$\{{ github.repository_owner }}"}`
      See https://github.com/docker/login-action#usage.
    default: ${{ github.repository_owner }}
    required: true
  oci-registry-password:
    description: |
      Password or personal access token configuration used to log against OCI registries.
      Accepts either a single password/token string (default format) or a JSON object using the same keys as `oci-registry`.
      JSON example: `{"pull:private":"$\{{ github.token }}","push":"$\{{ github.token }}"}`
      Can be passed in using `secrets.GITHUB_TOKEN`.
      See https://github.com/docker/login-action#usage.
    default: ${{ github.token }}
    required: true
  built-images:
    description: |
      Built images data.
      Example:
      ```json
      {
        "application": {
          "name": "application",
          "registry": "ghcr.io",
          "repository": "my-org/my-repo/application",
          "tags": ["pr-63-5222075","pr-63"],
          "images": [
            "ghcr.io/my-org/my-repo/application@sha256:d31aa93410434ac9dcfc9179cac2cb1fd4d7c27f11527addc40299c7c675f49d",
            "ghcr.io/my-org/my-repo/application@sha256:0f5aa93410434ac9dcfc9179cac2cb1fd4d7c27f11527addc40299c7c675f402",
          ],
          "annotations": {
            "org.opencontainers.image.created": "2021-09-30T14:00:00Z",
            "org.opencontainers.image.description": "Application image"
          },
          "platforms": ["linux/amd64", "linux/arm64"],
          "multi-platform": true
        }
      }
      ```
    required: true

outputs:
  built-images:
    description: |
      Built images data.
      Example:
      ```json
      {
        "application": {
          "name": "application",
          "registry": "ghcr.io",
          "repository": "my-org/my-repo/application",
          "tags": ["pr-63-5222075","pr-63"],
          "digest": "sha256:d31aa93410434ac9dcfc9179cac2cb1fd4d7c27f11527addc40299c7c675f49d",
          "images": [
            "ghcr.io/my-org/my-repo/application:pr-63-5222075@sha256:d31aa93410434ac9dcfc9179cac2cb1fd4d7c27f11527addc40299c7c675f49d",
            "ghcr.io/my-org/my-repo/application:pr-63@sha256:d31aa93410434ac9dcfc9179cac2cb1fd4d7c27f11527addc40299c7c675f49d"
          ],
          "annotations": {
            "org.opencontainers.image.created": "2021-09-30T14:00:00Z",
            "org.opencontainers.image.description": "Application image"
          },
          "platforms": ["linux/amd64", "linux/arm64"]
        }
      }
      ```
    value: ${{ steps.get-built-images-digest.outputs.built-images }}

runs:
  using: "composite"
  steps:
    - uses: hoverkraft-tech/ci-github-common/actions/local-actions@624be17604ee0a7378488191aacb35851e7cf001 # 0.37.1
      with:
        source-path: ${{ github.action_path }}/../..
        destination-directory-name: self-actions-create-images-manifests

    - id: docker-setup
      uses: ./../self-actions-create-images-manifests/docker/setup
      with:
        oci-registry: ${{ inputs.oci-registry }}
        oci-registry-username: ${{ inputs.oci-registry-username }}
        oci-registry-password: ${{ inputs.oci-registry-password }}
        built-images: ${{ inputs.built-images }}

    - id: create-images-manifests
      name: Create images manifests and push
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        INPUT_BUILT_IMAGES: ${{ inputs.built-images }}
      with:
        script: |
          const builtImagesInput = process.env.INPUT_BUILT_IMAGES || "";
          let builtImages = null;
          try {
            builtImages = JSON.parse(builtImagesInput);
          } catch (error) {
            throw new Error(`"built-images" input is not a valid JSON: ${error}`);
          }

          // Helper function to validate image data
          function validateImage(builtImage) {
            if (!builtImage.images || builtImage.images.length === 0) {
              throw new Error(`No images found for "${builtImage.name}"`);
            }
          }

          // Helper function to create multiarch manifest
          async function createMultiarchManifest(builtImage, imagesWithTags) {
            const platformArgs = builtImage.platforms.flatMap(platform => ["--platform", platform]);
            const tagArgs = imagesWithTags.flatMap(image => ["--tag", image]);
            const annotationArgs = Object.keys(builtImage.annotations).flatMap(key => [
              "--annotation",
              `index:${key}=${builtImage.annotations[key]}`,
            ]);
            const sourceArgs = builtImage.images;

            const createManifestArgs = [
              "buildx", "imagetools", "create",
              ...platformArgs,
              ...annotationArgs,
              ...tagArgs,
              ...sourceArgs,
            ];

            const maxAttempts = 6;
            const delayMs = 5000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const result = await exec.getExecOutput("docker", createManifestArgs, { ignoreReturnCode: true });

              if (result.exitCode === 0) {
                core.debug(`Create manifest for "${builtImage.name}" executed`);
                builtImage.images = imagesWithTags;
                return;
              }

              const commandOutput = `${result.stderr || ""}\n${result.stdout || ""}`.trim();
              const isRetryableNotFound = /not found|manifest unknown|no such manifest/i.test(commandOutput);

              if (!isRetryableNotFound || attempt === maxAttempts) {
                throw new Error(
                  `Failed to create manifest for "${builtImage.name}" (attempt ${attempt}/${maxAttempts}, exit code: ${result.exitCode}).\n${commandOutput}`,
                );
              }

              core.warning(
                `Source manifest for "${builtImage.name}" not yet available (attempt ${attempt}/${maxAttempts}). Retrying in ${delayMs}ms...`,
              );
              await new Promise(resolve => setTimeout(resolve, delayMs));
            }
          }

          // Helper function to build image tags
          function buildImageTags(builtImage) {
            const imagesWithTags = [];
            for (const tag of builtImage.tags) {
              const imageWithTag = `${builtImage.registry}/${builtImage.repository}:${tag}`;
              imagesWithTags.push(imageWithTag);
            }
            return imagesWithTags;
          }

          // Process each image
          const commands = Object.keys(builtImages).map(imageName => {
            const builtImage = builtImages[imageName];
            const imagesWithTags = buildImageTags(builtImage);
            return new Promise(async (resolve, reject) => {
              try {
                if(!builtImage["multi-platform"]) {
                  core.debug(`Skipping manifest creation for "${builtImage.name}" as "multi-platform" is not set to true`);
                  builtImage.images = imagesWithTags;
                  return resolve();
                }

                await createMultiarchManifest(builtImage, imagesWithTags);
                resolve();
              } catch (error) {
                reject(error);
              }
            });
          });

          await Promise.all(commands);

          core.debug("Manifest created and pushed");

          core.setOutput("built-images", JSON.stringify(builtImages));

    - name: Get built images digest
      id: get-built-images-digest
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        BUILT_IMAGES_OUTPUT: ${{ steps.create-images-manifests.outputs.built-images }}
      with:
        script: |
          const builtImagesOutputs = process.env.BUILT_IMAGES_OUTPUT || "";
          let builtImages = null;
          try {
            builtImages = JSON.parse(builtImagesOutputs);
          } catch (error) {
            throw new Error(`"built-images" output is not a valid JSON: ${error}`);
          }

          const sleep = (delayMs) =>
            new Promise((resolve) => setTimeout(resolve, delayMs));

          const getImageDigest = async function(image) {
            // Check if the image already has a digest
            if (image.match(/@/)) {
              core.debug(`Image "${image}" already has a digest, skipping inspection.`);
              return image;
            }

            const inspectImageArgs = ["buildx", "imagetools", "inspect", image];
            const inspectImageCommand = `docker ${inspectImageArgs.join(" ")}`;
            core.debug(`Inspecting image "${image}" with command: "${inspectImageCommand}"`);

            let stdout = "";
            const maxAttempts = 6;
            const delayMs = 5000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const result = await exec.getExecOutput(
                "docker",
                inspectImageArgs,
                { ignoreReturnCode: true },
              );

              stdout = result.stdout;

              if (result.exitCode === 0 && stdout) {
                core.debug(
                  `Inspect image "${image}" ("${inspectImageCommand}") executed: ${stdout}`
                );
                break;
              }

              const commandOutput = `${result.stderr || ""}\n${stdout}`.trim();
              const isRetryableNotFound = /not found|manifest unknown|no such manifest/i.test(commandOutput);

              if (!isRetryableNotFound || attempt === maxAttempts) {
                throw new Error(
                  `Failed to retrieve manifest for image "${image}": ` +
                  `"${inspectImageCommand}" failed with exit code ${result.exitCode}. ` +
                  `Output: ${commandOutput || "<empty>"}`
                );
              }

              core.info(
                [
                  `Image "${image}" manifest is not visible yet`,
                  `(attempt ${attempt}/${maxAttempts}).`,
                  `Retrying in ${delayMs} ms.`,
                ].join(" ")
              );
              await sleep(delayMs);
            }

            if (!stdout) {
              throw new Error(`Failed to retrieve manifest for image "${image}": "${inspectImageCommand}" returned empty output`);
            }

            // Retrieve digest from the manifest
            const digestRegex = /Digest:\s+([a-z0-9]+:[a-z0-9]{64})/;
            const digestMatch = stdout.match(digestRegex);
            if (!digestMatch || digestMatch.length < 2) {
              throw new Error(`Failed to retrieve digest for image "${image}": "${inspectImageCommand}" returned unexpected output: ${stdout}`);
            }

            const digest = digestMatch[1];
            if (!digest) {
              throw new Error(`Failed to retrieve digest for image "${image}": "${inspectImageCommand}" returned empty digest`);
            }

            core.debug(`Digest for image "${image}" is "${digest}"`);
            return digest;
          }

          await Promise.all(Object.keys(builtImages).map(async (imageName) => {
            const builtImage = builtImages[imageName];
            const digest = await getImageDigest(builtImage.images[0]);

            // Update built image with the digest
            builtImage.digest = digest;
            builtImage.images = builtImage.images.map(image => `${image}@${digest}`);
          }));

          core.setOutput("built-images", JSON.stringify(builtImages));
