---
name: "Docker - Build image"
description: |
  Action to build and push a "raw" image with Docker for a specific platform.
  This action uses the Docker Buildx plugin to build the image.
  It supports caching.
  It returns the image digest URI, tags, and annotations, but does not handle it itself.
author: hoverkraft
branding:
  icon: package
  color: blue

inputs:
  oci-registry:
    description: |
      OCI registry configuration used to pull, push and cache images.
      Accepts either a registry hostname string (legacy format) or a JSON object.
      JSON object keys:
      - `default`: fallback registry for unspecified operations
      - `pull`: string or array of registries to authenticate for pulls
      - `push`: registry used for published images
      - `cache`: registry used when `cache-type` is `registry`
    default: "ghcr.io"
    required: true
  oci-registry-username:
    description: |
      Username configuration used to log against OCI registries.
      Accepts either a single username string (legacy format) or a JSON object keyed by registry hostname.
      JSON object can also define `default` as a fallback username.
      See https://github.com/docker/login-action#usage.
    default: ${{ github.repository_owner }}
    required: true
  oci-registry-password:
    description: |
      Password or personal access token configuration used to log against OCI registries.
      Accepts either a single password/token string (legacy format) or a JSON object keyed by registry hostname.
      JSON object can also define `default` as a fallback password/token.
      Can be passed in using `secrets.GITHUB_TOKEN`.
      See https://github.com/docker/login-action#usage.
    default: ${{ github.token }}
    required: true
  repository:
    description: |
      Repository name.
      Example: `my-org/my-repo`.
      See [Docker get-image-metadata action](../get-image-metadata/README.md).
    default: ${{ github.repository }}
    required: false
  image:
    description: |
      Additional image name.
      Example: `application`.
      See [Docker get-image-metadata action](../get-image-metadata/README.md).
    required: false
  tag:
    description: "Force image tag to publish"
    required: false
  platform:
    description: |
      Platform to build for. Example: `linux/amd64`.
      See https://github.com/docker/build-push-action#inputs.
    required: true
  context:
    description: |
      Build's context is the set of files located in the specified PATH or URL.
      See https://github.com/docker/build-push-action#inputs.
    default: "."
    required: false
  dockerfile:
    description: |
      Location of Dockerfile (defaults to Dockerfile).
      See https://github.com/docker/build-push-action#inputs.
    default: "Dockerfile"
    required: false
  build-args:
    description: |
      List of build-time variables.
      See https://github.com/docker/build-push-action#inputs.
    required: false
  target:
    description: |
      Sets the target stage to build.
      See https://github.com/docker/build-push-action#inputs.
    required: false
  secrets:
    description: |
      List of secrets to expose to the build.
      See https://docs.docker.com/build/ci/github-actions/secrets/.
    required: false
  secret-envs:
    description: |
      List of secret environment variables to expose to the build (e.g., `key=envname, MY_SECRET=MY_ENV_VAR`).
      See https://docs.docker.com/build/ci/github-actions/secrets/.
    required: false
  cache-type:
    description: |
      Cache type.
      See https://docs.docker.com/build/cache/backends.
    default: "gha"
    required: false
  multi-platform:
    description: |
      Whether this build participates in a multi-platform image publication.
      When true, the image is pushed by digest only so manifests can be assembled later.
      When false, the image is pushed with its tags directly.
    default: false
    required: false

outputs:
  built-image:
    description: |
      Built image data.
      Example:
      ```json
      {
        "name": "application",
        "registry": "ghcr.io",
        "repository": "my-org/my-repo/application",
        "digest": "sha256:d31aa93410434ac9dcfc9179cac2cb1fd4d7c27f11527addc40299c7c675f49d",
        "image": "ghcr.io/my-org/my-repo/application@sha256:d31aa93410434ac9dcfc9179cac2cb1fd4d7c27f11527addc40299c7c675f49d",
        "tags": [
          "pr-63-5222075",
          "pr-63"
        ],
        "annotations": {
          "org.opencontainers.image.created": "2021-09-30T14:00:00Z",
          "org.opencontainers.image.description": "Application image"
        },
        "platform": "linux/amd64",
        "multi-platform": false
      }
      ```
    value: ${{ steps.get-built-image.outputs.built-image }}

runs:
  using: "composite"
  steps:
    - shell: bash
      # FIXME: workaround until will be merged: https://github.com/actions/runner/pull/1684
      run: mkdir -p ./self-actions/ && cp -r $GITHUB_ACTION_PATH/../../* ./self-actions/

    - id: slugify-platform
      uses: hoverkraft-tech/ci-github-common/actions/slugify@f5847cb398fe65d53794e6aba98ebdfa0801f691 # 0.32.0
      with:
        value: ${{ inputs.platform }}

    - id: resolve-oci-registries
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        script: |
          function parseJsonObjectInput(inputName, rawValue) {
            const value = `${rawValue}`.trim();
            if (!value.length) {
              return null;
            }

            if (!value.startsWith('{')) {
              return value;
            }

            let parsedValue;
            try {
              parsedValue = JSON.parse(value);
            } catch (error) {
              throw new Error(`"${inputName}" input is not a valid JSON object: ${error}`);
            }

            if (parsedValue === null || Array.isArray(parsedValue) || typeof parsedValue !== 'object') {
              throw new Error(`"${inputName}" input must be a string or a JSON object`);
            }

            return parsedValue;
          }

          function normalizeString(value, fieldName) {
            if (typeof value !== 'string') {
              throw new Error(`"${fieldName}" must be a string`);
            }

            const trimmedValue = value.trim();
            if (!trimmedValue.length) {
              throw new Error(`"${fieldName}" must not be empty`);
            }

            return trimmedValue;
          }

          function normalizeOptionalString(value, fieldName) {
            if (value === undefined || value === null) {
              return '';
            }

            return normalizeString(value, fieldName);
          }

          function normalizeRegistryList(value, fieldName) {
            if (value === undefined || value === null) {
              return [];
            }

            if (typeof value === 'string') {
              return [normalizeString(value, fieldName)];
            }

            if (!Array.isArray(value)) {
              throw new Error(`"${fieldName}" must be a string or an array of strings`);
            }

            return value.map((item, index) => normalizeString(item, `${fieldName}[${index}]`));
          }

          function normalizeCredentialMap(inputName, rawValue) {
            const parsedValue = parseJsonObjectInput(inputName, rawValue);

            if (parsedValue === null) {
              return {};
            }

            if (typeof parsedValue === 'string') {
              return { default: normalizeString(parsedValue, inputName) };
            }

            return Object.entries(parsedValue).reduce((credentialMap, [key, value]) => {
              credentialMap[key] = normalizeString(value, `${inputName}.${key}`);
              return credentialMap;
            }, {});
          }

          function resolveCredential(credentialMap, registry) {
            return credentialMap[registry] ?? credentialMap.default ?? '';
          }

          const registryInput = parseJsonObjectInput('oci-registry', `${{ inputs.oci-registry }}`);

          let pushRegistry = '';
          let cacheRegistry = '';
          let pullRegistries = [];

          if (typeof registryInput === 'string') {
            pushRegistry = normalizeString(registryInput, 'oci-registry');
            cacheRegistry = pushRegistry;
            pullRegistries = [pushRegistry];
          } else {
            const defaultRegistry = normalizeOptionalString(registryInput?.default, 'oci-registry.default');
            pushRegistry = normalizeOptionalString(registryInput?.push, 'oci-registry.push') || defaultRegistry;
            cacheRegistry = normalizeOptionalString(registryInput?.cache, 'oci-registry.cache') || pushRegistry || defaultRegistry;
            pullRegistries = normalizeRegistryList(registryInput?.pull, 'oci-registry.pull');

            if (!pushRegistry.length) {
              throw new Error(`"oci-registry.push" is required when "oci-registry" uses the JSON object format`);
            }

            if (!cacheRegistry.length) {
              cacheRegistry = pushRegistry;
            }
          }

          const cacheType = `${{ inputs.cache-type }}`.trim();
          const requiredRegistries = new Set([pushRegistry]);
          if (cacheType === 'registry') {
            requiredRegistries.add(cacheRegistry);
          }

          const registriesToLogin = [...new Set([...pullRegistries, ...requiredRegistries].filter(Boolean))];

          const usernameByRegistry = normalizeCredentialMap('oci-registry-username', `${{ inputs.oci-registry-username }}`);
          const passwordByRegistry = normalizeCredentialMap('oci-registry-password', `${{ inputs.oci-registry-password }}`);

          const registryLogins = registriesToLogin.map(registry => {
            const username = resolveCredential(usernameByRegistry, registry);
            const password = resolveCredential(passwordByRegistry, registry);

            if ((username && !password) || (!username && password)) {
              throw new Error(`Credentials for registry "${registry}" must define both username and password`);
            }

            if (requiredRegistries.has(registry) && (!username || !password)) {
              throw new Error(`Credentials for registry "${registry}" are required`);
            }

            return {
              registry,
              username,
              password,
              required: requiredRegistries.has(registry),
            };
          });

          const registryOutputNames = {
            push: ['push', 'registry'].join('-'),
            cache: ['cache', 'registry'].join('-'),
            pull: ['pull', 'registries'].join('-'),
            logins: ['registry', 'logins'].join('-'),
          };

          core.setOutput(registryOutputNames.push, pushRegistry);
          core.setOutput(registryOutputNames.cache, cacheRegistry);
          core.setOutput(registryOutputNames.pull, JSON.stringify(pullRegistries));
          core.setOutput(registryOutputNames.logins, JSON.stringify(registryLogins));

    - id: metadata
      uses: ./self-actions/docker/get-image-metadata
      with:
        oci-registry: ${{ steps.resolve-oci-registries.outputs.push-registry }}
        repository: ${{ inputs.repository }}
        image: ${{ inputs.image }}
        tag: ${{ inputs.tag }}

    - shell: bash
      # FIXME: workaround until will be merged: https://github.com/actions/runner/pull/1684
      run: |
        rm -fr ./self-actions

    - id: get-docker-config
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        script: |
          const fs = require('fs');
          const path = require('path');

          const workspace = process.env.GITHUB_WORKSPACE || process.cwd();
          const rawContext = `${{ inputs.context }}`.trim();
          const contextPath = rawContext.length > 0 ? rawContext : '.';
          const rawDockerfile = `${{ inputs.dockerfile }}`.trim();
          const dockerfileName = rawDockerfile.length > 0 ? rawDockerfile : 'Dockerfile';

          const dockerfilePath = path.resolve(workspace, contextPath, dockerfileName);

          if (!fs.existsSync(dockerfilePath) || !fs.statSync(dockerfilePath).isFile()) {
            return core.setFailed(`Dockerfile not found at path: ${dockerfilePath}`);
          }

          const resolvedDockerfilePath = fs.realpathSync(dockerfilePath);
          core.setOutput('dockerfile-path', resolvedDockerfilePath);

          const slugifiedPlatform = `${{ steps.slugify-platform.outputs.result }}`;
          const tagSuffix = `-${slugifiedPlatform}`;
          core.setOutput('cache-flavor', `suffix=${tagSuffix}`);

          const cacheType = `${{ inputs.cache-type }}`.trim();
          const metadataImage = `${{ steps.metadata.outputs.image }}`;
          const cacheRegistry = `${{ steps.resolve-oci-registries.outputs.cache-registry }}`.trim();
          const metadataImageWithoutRegistry = metadataImage.replace(/^[^\/]+\//, '');
          const cacheBaseImage = cacheRegistry.length ? `${cacheRegistry}/${metadataImageWithoutRegistry}` : metadataImage;
          const cacheImage = cacheType === 'registry' ? `${cacheBaseImage}/cache` : metadataImage;
          core.setOutput('cache-image', cacheImage);

          try {
            await exec.exec('command -v docker', { stdio: 'ignore' });
            core.setOutput('docker-exists', 'true');
          } catch (error) {
            // docker not available on runner
          }

          const multiplatformInput = `${{ inputs.multi-platform }}`.trim().toLowerCase();
          const isMultiplatform = !(multiplatformInput.length === 0 || multiplatformInput === 'false');
          if (isMultiplatform) {
            core.debug('Multi-platform build is enabled.');
            core.setOutput('multi-platform', true);
          }

          const platform = `${{ inputs.platform }}`.trim();
          if (platform.length === 0) {
            return core.setFailed('Input "platform" is required.');
          }
          const [platformOs, ...platformArchParts] = platform.split('/');
          const { stdout: runnerOsOutput } = await exec.getExecOutput('uname -s');
          const runnerOs = runnerOsOutput.trim().toLowerCase();

          core.debug(`Platform OS: ${platformOs}`);
          core.debug(`Runner OS: ${runnerOs}`);

          if (platformOs.toLowerCase() === runnerOs) {
            const platformArch = platformArchParts.join('/');

            const { stdout: runnerArchOutput } = await exec.getExecOutput('uname -m');
            const runnerArch = runnerArchOutput.trim();

            core.debug(`Platform arch: ${platformArch}`);
            core.debug(`Runner arch: ${runnerArch}`);

            let runnerArchNormalized = runnerArch;
            switch (runnerArch) {
              case 'x86_64':
                runnerArchNormalized = 'amd64';
                break;
              case 'aarch64':
                runnerArchNormalized = 'arm64';
                break;
              case 'armv7l':
                runnerArchNormalized = 'arm/v7';
                break;
              default:
                core.warning(`Unsupported architecture: ${runnerArchRaw}`);
                break;
            }

            if (platformArch === runnerArchNormalized) {
              core.setOutput('platform-exists', 'true');
            }
          }

    - if: steps.get-docker-config.outputs.docker-exists != 'true'
      uses: docker/setup-docker-action@1a6edb0ba9ac496f6850236981f15d8f9a82254d # v5.0.0

    - if: steps.get-docker-config.outputs.platform-exists != 'true'
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      with:
        platforms: ${{ inputs.platform }}

    - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      id: setup-buildx
      with:
        # FIXME: upgrade version when available (https://github.com/docker/buildx/releases)
        version: v0.31.1
        # FIXME: upgrade version when available (https://hub.docker.com/r/moby/buildkit)
        driver-opts: |
          image=moby/buildkit:v0.27.0

    # Caching setup
    - id: cache-arguments
      uses: int128/docker-build-cache-config-action@3a4a4fababc091be29633e5a2b3bbf523996802a # v1.47.0
      with:
        image: ${{ steps.get-docker-config.outputs.cache-image }}
        flavor: ${{ steps.get-docker-config.outputs.cache-flavor }}
        pull-request-cache: true
        cache-type: ${{ inputs.cache-type }}
        extra-cache-to: "image-manifest=true,oci-mediatypes=true"

    - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      id: cache
      with:
        path: cache-mount
        key: cache-mount-${{ hashFiles(steps.get-docker-config.outputs.dockerfile-path) }}

    - name: Restore Docker cache mounts
      uses: reproducible-containers/buildkit-cache-dance@1b8ab18fbda5ad3646e3fcc9ed9dd41ce2f297b4 # v3.3.2
      with:
        builder: ${{ steps.setup-buildx.outputs.name }}
        cache-dir: cache-mount
        dockerfile: ${{ steps.get-docker-config.outputs.dockerfile-path }}
        skip-extraction: ${{ steps.cache.outputs.cache-hit }}

    - id: login-oci-registries
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        script: |
          const registryLoginsInput = `${{ steps.resolve-oci-registries.outputs.registry-logins }}`;
          let registryLogins = [];
          try {
            registryLogins = JSON.parse(registryLoginsInput);
          } catch (error) {
            throw new Error(`Resolved registry logins are not a valid JSON array: ${error}`);
          }

          for (const registryLogin of registryLogins) {
            const { registry, username, password, required } = registryLogin;

            if (!username && !password) {
              if (required) {
                throw new Error(`Credentials for registry "${registry}" are required`);
              }

              core.info(`Skipping Docker login for optional registry "${registry}" because no credentials were provided.`);
              continue;
            }

            await exec.exec(
              'docker',
              ['login', registry, '--username', username, '--password-stdin'],
              {
                input: `${password}\n`,
                silent: true,
              },
            );

            core.info(`Logged in to "${registry}".`);
          }
    # jscpd:ignore-end
    - id: build
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: ${{ inputs.context }}
        build-args: ${{ inputs.build-args }}
        target: ${{ inputs.target }}
        file: ${{ steps.get-docker-config.outputs.dockerfile-path }}
        secrets: ${{ inputs.secrets }}
        secret-envs: ${{ inputs.secret-envs }}
        platforms: ${{ inputs.platform }}
        cache-from: ${{ steps.cache-arguments.outputs.cache-from }}
        cache-to: ${{ steps.cache-arguments.outputs.cache-to }}
        outputs: |
          ${{ steps.get-docker-config.outputs.multi-platform && 'type=image,push-by-digest=true,name-canonical=true,push=true' || 'type=image,push=true' }}
        labels: ${{ steps.metadata.outputs.labels }}
        annotations: ${{ steps.metadata.outputs.annotations }}
        tags: ${{ steps.get-docker-config.outputs.multi-platform && steps.metadata.outputs.image || steps.metadata.outputs.tags }}
        provenance: false # Disable provenance to avoid unknown/unknown arch
        sbom: false # Disable sbom to avoid unknown/unknown arch

    - id: get-built-image
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        script: |
          const builtMetadata = ${{ steps.build.outputs.metadata }};
          if (typeof builtMetadata !== 'object') {
            core.setFailed('Given "metadata" output is not a JSON object.');
            return;
          }

          const name = `${{ inputs.image }}`;
          const image = `${{ steps.metadata.outputs.image }}`;
          const registryMatch = image.match(/^([^\/]+)\/.*/);
          const registry = registryMatch ? registryMatch[1] : null;
          const repositoryMatch = image.match(/^[^\/]+\/([^:]+)/);
          const repository = repositoryMatch ? repositoryMatch[1] : null;

          const tags = `${{ steps.metadata.outputs.tags }}`
          .split("\n")
          .map(tag => tag.replace(/[^\/]+\/[^:]+:(.+)/,'$1').trim())
          .filter(tag => tag !== "");

          let platform;

          const buildxProvenance = builtMetadata?.["buildx.build.provenance"];
          if (buildxProvenance !== undefined) {
            platform = buildxProvenance.invocation?.environment?.platform;
            if (platform === undefined) {
              return core.setFailed('Given "metadata"."buildx.build.provenance"."invocation"."environment"."platform" output is undefined.');
            }
            if (typeof platform !== "string") {
              return core.setFailed('Given "metadata"."buildx.build.provenance"."invocation"."environment"."platform" is not a string.');
            }
            platform = platform.trim();
            if (platform === "") {
              return core.setFailed('Given "metadata"."buildx.build.provenance"."invocation"."environment"."platform" is empty.');
            }
          } else {
            const descriptor = builtMetadata?.["containerimage.descriptor"];
            if (descriptor?.["platform"] === undefined) {
              return core.setFailed('Given "metadata"."containerimage.descriptor"."platform" output is undefined.');
            }
            const platformData = descriptor["platform"];
            if (typeof platformData !== 'object' || platformData.os === undefined || platformData.architecture === undefined) {
              return core.setFailed('Given "metadata"."containerimage.descriptor"."platform" does not contain required "os" and "architecture" fields.');
            }
            platform = `${platformData.os}/${platformData.architecture}${platformData.variant ? `/${platformData.variant}` : ''}`;
          }

          if (builtMetadata?.["containerimage.digest"] === undefined) {
            return core.setFailed('Given "metadata"."containerimage.digest" output is undefined.');
          }

          const digests = builtMetadata["containerimage.digest"]
            .split(",")
            .map(digest => {
              const cleanedDigest = digest.trim();
              return cleanedDigest !== "" ? cleanedDigest : null;
            })
            .filter(digest => digest !== null);

          const uniqueDigests = [...new Set(digests)];
          if (uniqueDigests.length === 0) {
            return core.setFailed('No valid digests found in "containerimage.digest" output.');
          }

          if( uniqueDigests.length > 1 ) {
            return core.setFailed(`Multiple digests found: ${uniqueDigests.join(", ")}.`);
          }

          const digest = uniqueDigests[0];
          const imageWithDigest = `${image}@${digest}`;

          const annotations = `${{ steps.metadata.outputs.annotations }}`
            .split("\n")
            .map(annotation => {
              const cleanedAnnotation = annotation
                .replace(/^[^:]+:/, "")
                .trim();
              return cleanedAnnotation !== "" ? cleanedAnnotation : null;
            })
            .filter(annotation => annotation !== null)
            .reduce((annotations, annotation) => {
              const [key, value] = annotation.split("=");
              annotations[key] = value;
              return annotations;
            }, {})

          const isMultiplatform = Boolean(`${{ steps.get-docker-config.outputs.multi-platform }}`);

          const builtImage = {
            name,
            tags,
            annotations,
            registry,
            repository,
            image: imageWithDigest,
            digest,
            platform,
            "multi-platform": isMultiplatform,
          };

          core.setOutput("built-image", JSON.stringify(builtImage));
