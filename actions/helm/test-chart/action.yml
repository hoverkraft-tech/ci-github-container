---
name: "Test Helm Chart"
description: |
  Action to lint and test installing some Helm chart(s).
  Mainly using [helm/chart-testing-action](https://github.com/helm/chart-testing-action).
author: hoverkraft
branding:
  icon: check-circle
  color: blue

inputs:
  working-directory:
    description: "Working directory"
    required: false
    default: "${{ github.workspace }}"
  helm-set:
    description: |
      Set values for Helm chart.
      Multiple values can be set using multiline string.
      Example:
      ```
      key1=value1
      key2=value2
      ```
    required: false
  helm-repositories:
    description: |
      List of Helm repositories to add before testing charts.
      See https://helm.sh/docs/helm/helm_repo_add/.
    required: false
  oci-registry:
    description: "OCI registry where to pull and push images"
    default: "ghcr.io"
    required: false
  oci-registry-username:
    description: |
      Username used to log against the OCI registry.
      See https://github.com/docker/login-action#usage.
    default: ${{ github.repository_owner }}
    required: false
  oci-registry-password:
    description: |
      Password or personal access token used to log against the OCI registry.
      Can be passed in using `secrets.GITHUB_TOKEN`.
      See https://github.com/docker/login-action#usage.
    default: ${{ github.token }}
    required: false
  check-diff-only:
    description: |
      Only run lint and tests on changed charts.
    required: false
    default: "true"
  enable-lint:
    description: |
      Enable linting of the Helm chart.
      See https://github.com/helm/chart-testing/blob/main/doc/ct_lint.md.
    required: false
    default: "true"
  enable-install:
    description: |
      Enable installing the Helm chart.
      See https://github.com/helm/chart-testing/blob/main/doc/ct_install.md.
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      if: ${{ inputs.enable-lint != 'true' && inputs.enable-install != 'true' }}
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          core.setFailed(
            "At least one of 'enable-lint' or 'enable-install' " +
            'input must be true',
          );

    - uses: hoverkraft-tech/ci-github-common/actions/checkout@ff815105ba418bd0203868c8b52e0e02fea3f1a4 # 0.35.2
      with:
        fetch-depth: 0

    - name: Check for .tools-version file
      id: check-tools-version
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
      with:
        script: |
          const fs = require('node:fs');
          const path = require('node:path');

          const workingDirectory = path.resolve(
            process.env.GITHUB_WORKSPACE ?? '.',
            process.env.WORKING_DIRECTORY ?? '.',
          );
          const toolsVersionPath = path.join(
            workingDirectory,
            '.tools-version',
          );

          core.setOutput(
            'tools-version-exists',
            fs.existsSync(toolsVersionPath) ? 'true' : 'false',
          );

    - name: Install tools with asdf
      if: ${{ steps.check-tools-version.outputs.tools-version-exists == 'true' }}
      uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1

    - name: Check for ct.yaml file
      id: check-ct-yaml
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
      with:
        script: |
          const fs = require('node:fs');
          const path = require('node:path');

          const workingDirectory = path.resolve(
            process.env.GITHUB_WORKSPACE ?? '.',
            process.env.WORKING_DIRECTORY ?? '.',
          );
          const ctConfigPath = path.join(workingDirectory, 'ct.yaml');

          if (fs.existsSync(ctConfigPath)) {
            core.setOutput('path', 'ct.yaml');
          }

    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0

    - name: Set up chart-testing
      uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

    - name: Prepare chart dependencies
      uses: ./actions/helm/prepare-chart
      with:
        path: ${{ inputs.working-directory }}
        helm-repositories: >-
          ${{ inputs.helm-repositories }}

    - name: Prepare ct variables
      id: prepare-ct-variables
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        INPUT_CHECK_DIFF_ONLY: ${{ inputs.check-diff-only }}
        CT_CONFIG_PATH: ${{ steps.check-ct-yaml.outputs.path }}
      with:
        script: |
          const { randomUUID } = require('node:crypto');

          const args = [];

          if (process.env.INPUT_CHECK_DIFF_ONLY === 'true') {
            const targetBranch = context.eventName === 'pull_request'
              ? context.payload.pull_request?.base?.ref
              : context.payload.repository?.default_branch;

            if (targetBranch) {
              args.push('--target-branch', targetBranch);
            }
          }

          if (process.env.CT_CONFIG_PATH) {
            args.push('--config', process.env.CT_CONFIG_PATH);
          }

          if (args.length === 0) {
            args.push('--all');
          }

          core.setOutput('args', args.join(' '));
          core.setOutput('args-json', JSON.stringify(args));
          core.setOutput(
            'namespace',
            `test-chart-${process.env.GITHUB_RUN_ID}-${randomUUID()}`,
          );

    - name: Run chart-testing (lint)
      if: ${{ inputs.enable-lint == 'true' }}
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
        CT_ARGS_JSON: ${{ steps.prepare-ct-variables.outputs.args-json }}
      with:
        script: |
          const path = require('node:path');

          const workingDirectory = path.resolve(
            process.env.GITHUB_WORKSPACE ?? '.',
            process.env.WORKING_DIRECTORY ?? '.',
          );
          const ctArgs = JSON.parse(process.env.CT_ARGS_JSON ?? '[]');

          await exec.exec('ct', ['lint', ...ctArgs], {
            cwd: workingDirectory,
          });

    - name: Create kind cluster
      if: ${{ inputs.enable-install == 'true' }}
      uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

    - name: Install default OCI registry secrets
      id: oci-registry-secret
      if: ${{ inputs.enable-install == 'true' && inputs.oci-registry != '' && inputs.oci-registry-username != '' && inputs.oci-registry-password != '' }}
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        NAMESPACE: ${{ steps.prepare-ct-variables.outputs.namespace }}
        INPUT_OCI_REGISTRY: ${{ inputs.oci-registry }}
        INPUT_OCI_REGISTRY_USERNAME: ${{ inputs.oci-registry-username }}
        INPUT_OCI_REGISTRY_PASSWORD: ${{ inputs.oci-registry-password }}
      with:
        script: |
          const secretName = 'regcred';
          const namespace = process.env.NAMESPACE;

          core.setOutput('name', secretName);

          await exec.exec('kubectl', ['create', 'namespace', namespace]);
          await exec.exec('kubectl', [
            '--context',
            'kind-chart-testing',
            'create',
            'secret',
            'docker-registry',
            secretName,
            `--namespace=${namespace}`,
            `--docker-server=${process.env.INPUT_OCI_REGISTRY}`,
            `--docker-username=${process.env.INPUT_OCI_REGISTRY_USERNAME}`,
            `--docker-password=${process.env.INPUT_OCI_REGISTRY_PASSWORD}`,
          ]);

    - name: Run chart-testing (install)
      if: ${{ inputs.enable-install == 'true' }}
      env:
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
        CT_ARGS_JSON: ${{ steps.prepare-ct-variables.outputs.args-json }}
        NAMESPACE: ${{ steps.prepare-ct-variables.outputs.namespace }}
        INPUT_HELM_SET: ${{ inputs.helm-set }}
        OCI_REGISTRY_SECRET: ${{ steps.oci-registry-secret.outputs.name }}
        HELM_EXPERIMENTAL_OCI: true
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          const path = require('node:path');

          const workingDirectory = path.resolve(
            process.env.GITHUB_WORKSPACE ?? '.',
            process.env.WORKING_DIRECTORY ?? '.',
          );
          const namespace = process.env.NAMESPACE;
          const ctArgs = JSON.parse(process.env.CT_ARGS_JSON ?? '[]');
          const helmSetLines = [
            `namespace=${namespace}`,
            ...(process.env.INPUT_HELM_SET ?? '').split(/\r?\n/),
          ]
            .map((line) => line.trim())
            .filter((line) => line.length > 0)
            .map((line) => line.replaceAll(',', '\\,'));

          const ociRegistrySecret = process.env.OCI_REGISTRY_SECRET ?? '';
          if (ociRegistrySecret) {
            await exec.exec('kubectl', [
              'get',
              'secret',
              ociRegistrySecret,
              '--output=yaml',
              `--namespace=${namespace}`,
            ]);

            helmSetLines.push(
              `imagePullSecrets[0].name=${ociRegistrySecret}`,
            );
          }

          const helmExtraSetArgs = `--set=${helmSetLines.join(',')}`;

          await exec.exec('ct', [
            'install',
            ...ctArgs,
            '--namespace',
            namespace,
            '--helm-extra-set-args',
            helmExtraSetArgs,
          ], {
            cwd: workingDirectory,
          });
