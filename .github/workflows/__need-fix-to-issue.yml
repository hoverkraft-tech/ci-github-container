---
name: Need fix to Issue

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  workflow_dispatch:
    # checkov:skip=CKV_GHA_7: required
    inputs:
      manual-commit-ref:
        description: "The SHA of the commit to get the diff for"
        required: true
      manual-base-ref:
        description: |
          By default, the commit entered above is compared to the one directly before it;
          to go back further, enter an earlier SHA here
        required: false

permissions: {}

jobs:
  main:
    uses: hoverkraft-tech/ci-github-common/.github/workflows/need-fix-to-issue.yml@03a5a2a3626b03434b19b79cdd2e141bea410bae # 0.34.1
    permissions:
      contents: read
      issues: write
    with:
      manual-commit-ref: ${{ inputs.manual-commit-ref }}
      manual-base-ref: ${{ inputs.manual-base-ref }}
