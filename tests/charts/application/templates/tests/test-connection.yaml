# jscpd:ignore-start
---
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "test-application.fullname" . }}-test-connection"
  namespace: {{ .Values.namespace | default "app-system" }}
  labels:
    {{- include "test-application.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "test-application.labels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 10001
        runAsNonRoot: true
      containers:
        - name: wget
          image: busybox@sha256:9ae97d36d26566ff84e8893c64a6dc4fe8ca6d1144bf5b87b2b85a32def253c7
          command: ['sh', '-ec']
          args:
            - |
              attempts=0
              until wget -T 5 -O /dev/null -q 'http://{{ include "test-application.fullname" . }}:{{ .Values.service.port }}/health/check/'; do
                attempts=$((attempts + 1))
                if [ "$attempts" -ge 30 ]; then
                  exit 1
                fi
                sleep 5
              done
          resources:
            limits:
              cpu: "100m"
              memory: "128Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          securityContext:
            seccompProfile:
              type: RuntimeDefault
            readOnlyRootFilesystem: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - NET_RAW
                - ALL
      restartPolicy: Never
# jscpd:ignore-end
