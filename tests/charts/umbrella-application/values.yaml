# !!! this is an umbrella chart !!!
# the only values that should be defined must be under the 'global' key
# we also use components key to conditionally include dependencies (check Chart.yaml)
---
global:
  nameOverride: ""
  fullnameOverride: ""

# components

app:
  enabled: true

database:
  enabled: true
  fullnameOverride: database
  namespaceOverride: app-system
  architecture: standalone
  existingConfigmap: database-custom-config
  auth:
    enabled: false
  image:
    pullPolicy: Always
  primary:
    podSecurityContext:
      enabled: true
      fsGroup: 10001
    containerSecurityContext:
      enabled: true
      runAsUser: 10001
      runAsGroup: 10001
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
